<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Validation Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f6fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 420px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 14px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            color: #444;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus {
            border-color: #4a90e2;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #357abd;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>HTML5 Validation Form</h2>

    <form>

        <div class="form-group">
            <label for="name">Full Name</label>
            <input 
                type="text"
                id="name"
                placeholder="Enter your full name"
                required
                minlength="5"
                maxlength="50">
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input 
                type="email"
                id="email"
                placeholder="Enter your email"
                required>
        </div>

        <div class="form-group">
            <label for="username">Username</label>
            <input 
                type="text"
                id="username"
                placeholder="Choose a username"
                required
                minlength="6"
                maxlength="15">
        </div>

        <div class="form-group">
            <label for="phone">Contact Number</label>
            <input 
                type="tel"
                id="phone"
                placeholder="09XXXXXXXXX"
                required
                pattern="[0-9]{11}"
                maxlength="11">
        </div>

        <button type="submit">Submit</button>

    </form>

</div>

</body>
</html>
