<!DOCTYPE html>
<html>
<head>
    <title>Internal CSS Example</title>

    <style>
        h1 {
            color: blue;
            text-align: center;
        }

        p {
            color: green;
            font-size: 18px;
        }

        ul {
            background-color: lightgray;
            padding: 10px;
        }

        li {
            color: darkred;
        }
    </style>
</head>

<body>

    <h1>Welcome to My Webpage</h1>

    <p>
        This paragraph is styled using internal CSS.
    </p>

    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>

</body>
</html>
