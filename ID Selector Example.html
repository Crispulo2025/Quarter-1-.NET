<!DOCTYPE html>
<html>
<head>
    <title>ID Selector Example</title>

    <style>
        /* ID selector */
        #mainContent {
            background-color: lightblue;
            padding: 20px;
            border: 2px solid navy;
        }
    </style>
</head>
<body>

    <div id="mainContent">
        <h2>Welcome!</h2>
        <p>This div uses an ID selector to change its background color.</p>
    </div>

</body>
</html>
