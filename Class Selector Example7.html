<!DOCTYPE html>
<html>
<head>
    <title>Class Selector Example</title>

    <style>
        /* Class selector */
        .highlight {
            color: green;
            font-size: 18px;
            background-color: #f0f0f0;
            padding: 8px;
        }
    </style>
</head>
<body>

    <p class="highlight">This is the first paragraph using the class selector.</p>

    <p class="highlight">This is the second paragraph with the same style.</p>

    <p class="highlight">This is the third paragraph sharing the same class.</p>

</body>
</html>
