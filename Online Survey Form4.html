<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Survey Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .survey-container {
            width: 420px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            color: #444;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        textarea {
            height: 100px;
            resize: vertical;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #4a90e2;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #357abd;
        }
    </style>
</head>

<body>

<div class="survey-container">

    <h2>Online Survey Form</h2>
    <p>Please answer the survey below.</p>

    <form>

        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name"
                   placeholder="Enter your name">
        </div>

        <div class="form-group">
            <label for="age">Age</label>
            <input type="number" id="age"
                   placeholder="Enter your age">
        </div>

        <div class="form-group">
            <label for="subject">Favorite Subject</label>
            <select id="subject">
                <option>Select Subject</option>
                <option>Mathematics</option>
                <option>Science</option>
                <option>English</option>
                <option>Social Studies</option>
                <option>Computer</option>
            </select>
        </div>

        <div class="form-group">
            <label for="suggestions">Suggestions</label>
            <textarea id="suggestions"
            placeholder="Write your suggestions here...">
            </textarea>
        </div>

        <button type="submit">Submit Survey</button>

    </form>

</div>

</body>
</html>
