<h2>Steps in Logging into a Computer</h2>

<ol>
    <li>Turn on the computer.</li>
    <li>Wait for the login screen to appear.</li>
    <li>Enter your username.</li>
    <li>Type your password.</li>
    <li>Click the Login or Sign In button.</li>
</ol>
