<!DOCTYPE html>
<html>
<head>
    <title>Inline CSS Override Example</title>

    <!-- Link to external CSS -->
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <h1>CSS Override Example</h1>

    <!-- Uses external CSS -->
    <p>This paragraph uses the external CSS style.</p>

    <!-- Inline CSS overrides external CSS -->
    <p style="color: red;">
        This paragraph uses inline CSS to override the external CSS color.
    </p>

</body>
</html>
