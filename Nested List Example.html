<!DOCTYPE html>
<html>
<head>
    <title>Nested List Example</title>
</head>
<body>

    <h2>Study Plan</h2>

    <ol>
        <li>Morning Routine
            <ul>
                <li>Wake up early</li>
                <li>Exercise</li>
                <li>Breakfast</li>
            </ul>
        </li>

        <li>Study Time
            <ul>
                <li>Review notes</li>
                <li>Practice exercises</li>
                <li>Do assignments</li>
            </ul>
        </li>

        <li>Evening Routine
            <ul>
                <li>Dinner</li>
                <li>Relax</li>
                <li>Sleep</li>
            </ul>
        </li>
    </ol>

</body>
</html>
