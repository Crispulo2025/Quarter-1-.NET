<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Admission Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eef3f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 460px;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            color: #444;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
            height: 80px;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #2563eb;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>School Admission Form</h2>

    <form>

        <div class="form-group">
            <label for="student">Student Name</label>
            <input type="text" id="student" placeholder="Enter student name">
        </div>

        <div class="form-group">
            <label for="parent">Parent Name</label>
            <input type="text" id="parent" placeholder="Enter parent name">
        </div>

        <div class="form-group">
            <label for="address">Address</label>
            <textarea id="address" placeholder="Enter complete address"></textarea>
        </div>

        <div class="form-group">
            <label for="contact">Contact Number</label>
            <input type="tel" id="contact" placeholder="Enter contact number">
        </div>

        <div class="form-group">
            <label for="school">Previous School</label>
            <input type="text" id="school" placeholder="Enter previous school name">
        </div>

        <button type="submit">Submit Application</button>

    </form>

</div>

</body>
</html>
