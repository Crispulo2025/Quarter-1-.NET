<!DOCTYPE html>
<html>
<head>
    <title>HTML Tags Description List</title>
</head>
<body>

    <h2>HTML Tags and Their Purposes</h2>

    <dl>
        <dt>&lt;p&gt;</dt>
        <dd>Defines a paragraph of text in an HTML document.</dd>

        <dt>&lt;h1&gt;</dt>
        <dd>Defines the main heading or largest heading on a webpage.</dd>

        <dt>&lt;a&gt;</dt>
        <dd>Creates hyperlinks that connect one webpage to another or link to external resources.</dd>
    </dl>

</body>
</html>
