<!DOCTYPE html>
<html>
<head>
    <title>Inline and Internal CSS Example</title>

    <style>
        p {
            color: green;
            font-size: 18px;
        }
    </style>

</head>
<body>

    <h1 style="color: red; text-align: center;">
        This heading uses inline CSS
    </h1>

    <p>
        This paragraph uses internal CSS defined in the &lt;style&gt; section.
    </p>

</body>
</html>
