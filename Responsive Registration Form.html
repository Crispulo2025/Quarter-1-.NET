<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Registration Form</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f7fb;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 15px;
    }

    .container {
        width: 100%;
        max-width: 500px;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 5px 14px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        margin-bottom: 15px;
    }

    label {
        margin-bottom: 6px;
        font-weight: bold;
        color: #444;
    }

    input, select {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
        width: 100%;
        box-sizing: border-box;
    }

    input:focus, select:focus {
        border-color: #4a90e2;
        outline: none;
    }

    .row {
        display: flex;
        gap: 10px;
    }

    .row .form-group {
        flex: 1;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #4a90e2;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        background: #357abd;
    }

    /* 📱 Responsive Design */
    @media (max-width: 600px) {
        .row {
            flex-direction: column;
        }
    }
</style>
</head>

<body>

<div class="container">

    <h2>Registration Form</h2>

    <form>

        <div class="row">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" placeholder="First name">
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input type="text" placeholder="Last name">
            </div>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="Enter email">
        </div>

        <div class="form-group">
            <label>Contact Number</label>
            <input type="tel" placeholder="Enter phone number">
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select>
                <option>Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Prefer not to say</option>
            </select>
        </div>

        <button type="submit">Register</button>

    </form>

</div>

</body>
</html>
