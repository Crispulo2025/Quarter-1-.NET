<!DOCTYPE html>
<html>
<head>
    <title>Center Paragraphs Example</title>

    <style>
        p {
            text-align: center;
        }
    </style>

</head>
<body>

    <h1>Welcome to My Webpage</h1>

    <p>This paragraph is centered using internal CSS.</p>
    <p>All paragraphs in this page are aligned to the center.</p>

</body>
</html>
