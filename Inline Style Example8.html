<!DOCTYPE html>
<html>
<head>
    <title>Inline Style Example</title>
</head>
<body>

    <p style="color: red; font-size: 16px;">
        This is the first paragraph (red text).
    </p>

    <p style="color: blue; font-size: 18px; text-align: center;">
        This is the second paragraph (blue text, centered).
    </p>

    <p style="color: green; font-size: 20px; font-style: italic;">
        This is the third paragraph (green, italic).
    </p>

</body>
</html>
